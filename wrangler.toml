# ============================================================
# PiForum — Cloudflare Workers (OpenNext) Configuration
# ============================================================
# ✅ Pre-configured with real Cloudflare resource IDs from your account:
#    - Pages project:  piforum (piforum.pages.dev)
#    - R2 bucket:      piforum-uploads
#    - KV namespace:   piforum-sessions (c36268abac2d4fe3bd426a92a060e2fb)
#    - Account:        Techctg24 Inc (704489378006d2bed6a45de180f6679f)
#
# ⚠️ D1 database: NOT yet created — your API token lacks "D1 Edit" permission.
#    To fix: create a new token at https://dash.cloudflare.com/profile/api-tokens
#    with these permissions: Account → D1 → Edit, Account → Workers Scripts → Edit,
#    Account → Workers KV Storage → Edit, Account → Workers R2 Storage → Edit,
#    Zone → Workers Routes → Edit. Then run: npx wrangler d1 create piforum
#    and paste the database_id below.
# ============================================================

name = "piforum"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# Use OpenNext for Cloudflare (deploys as Worker, supports more Node.js APIs than Pages)
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# ============================================================
# Account ID (Techctg24 Inc)
# ============================================================
account_id = "704489378006d2bed6a45de180f6679f"

# ============================================================
# D1 Database binding
# ============================================================
# ⚠️ Create the DB first, then paste the UUID below.
#    Command: npx wrangler d1 create piforum
[[d1_databases]]
binding = "DB"
database_name = "piforum"
database_id = "25923490-eba7-4e98-b9f0-34c9c183c0b9"

# ============================================================
# R2 Storage binding (✅ bucket 'piforum-uploads' already created)
# ============================================================
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "piforum-uploads"

# ============================================================
# KV Namespace binding (✅ 'piforum-sessions' already created)
# ============================================================
[[kv_namespaces]]
binding = "SESSIONS"
id = "c36268abac2d4fe3bd426a92a060e2fb"

# ============================================================
# Environment variables (non-secret)
# ============================================================
[vars]
NEXT_PUBLIC_SITE_URL = "https://piforum.eu.org"
NEXT_PUBLIC_SITE_NAME = "PiForum"
NEXTAUTH_URL = "https://piforum.eu.org"

# Secrets to set via `wrangler secret put NAME`:
#   NEXTAUTH_SECRET          (generate: openssl rand -base64 32)
#   ZAI_API_KEY
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASSWORD / SMTP_FROM
#   WHATSAPP_TOKEN / WHATSAPP_PHONE_NUMBER_ID / WHATSAPP_VERIFY_TOKEN
#   TELEGRAM_BOT_TOKEN

# ============================================================
# Observability
# ============================================================
[observability]
enabled = true

# ============================================================
# Routes (custom domains) — uncomment after first deploy
# ============================================================
# [[routes]]
# pattern = "piforum.eu.org"
# custom_domain = true
#
# [[routes]]
# pattern = "piforum.eu.cc"
# custom_domain = true
